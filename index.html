<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventures of Oscar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .header-subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .qr-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .qr-section h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        #qrCode {
            max-width: 300px;
            margin: 0 auto;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .feed {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .feed h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .post {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .post-author {
            font-weight: bold;
            color: #667eea;
        }
        
        .post-time {
            color: #999;
            font-size: 0.85em;
        }
        
        .post-image {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            max-height: 300px;
            object-fit: cover;
        }
        
        .post-text {
            color: #333;
            line-height: 1.5;
            margin: 10px 0;
        }
        
        .post-hashtags {
            color: #667eea;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .user-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .user-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .post-stats {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header-title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">🐱 The Adventures of Oscar</div>
            <div class="header-subtitle">Where Oscar's friends share the mystery cat's daily adventures</div>
        </header>
        
        <div class="qr-section">
            <h3>📱 Scan to Join the Chat</h3>
            <div id="qrCode"></div>
        </div>
        
        <div class="main-content">
            <div class="feed">
                <h2>📰 Feed</h2>
                <div id="feedContainer"></div>
            </div>
            
            <div class="sidebar">
                <div class="user-card">
                    <h3>Share Your Oscar Story</h3>
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" placeholder="Your name or nickname">
                    </div>
                    <div class="input-group">
                        <label>Your Message</label>
                        <textarea id="userMessage" placeholder="Share your Oscar encounter..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Hashtags (optional)</label>
                        <input type="text" id="userHashtags" placeholder="#oscarsighting #mysterycatlife">
                    </div>
                    <button class="btn" onclick="addPost()">Post to Feed 🚀</button>
                </div>
                
                <div class="post-stats">
                    <h3 style="color: #667eea; margin-bottom: 15px;">📊 Stats</h3>
                    <div class="stat">
                        <span class="stat-label">Total Messages</span>
                        <span class="stat-value" id="totalPosts">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Contributors</span>
                        <span class="stat-value" id="totalUsers">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Initialize posts storage
        let posts = JSON.parse(localStorage.getItem('oscarPosts')) || [];
        let users = new Set(JSON.parse(localStorage.getItem('oscarUsers')) || []);
        
        // Generate QR Code
        function generateQR() {
            const qrContainer = document.getElementById('qrCode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: window.location.href,
                width: 300,
                height: 300,
                colorDark: "#667eea",
                colorLight: "#ffffff"
            });
        }
        
        // Format timestamp
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            
            if (hours > 24) {
                return date.toLocaleDateString();
            } else if (hours > 0) {
                return hours + 'h ago';
            } else if (minutes > 0) {
                return minutes + 'm ago';
            } else {
                return 'just now';
            }
        }
        
        // Add new post
        function addPost() {
            const name = document.getElementById('userName').value.trim();
            const message = document.getElementById('userMessage').value.trim();
            const hashtags = document.getElementById('userHashtags').value.trim();
            
            if (!name || !message) {
                alert('Please enter your name and a message!');
                return;
            }
            
            const post = {
                id: Date.now(),
                author: name,
                message: message,
                hashtags: hashtags,
                timestamp: new Date(),
                image: null
            };
            
            posts.unshift(post);
            users.add(name);
            
            // Save to localStorage
            localStorage.setItem('oscarPosts', JSON.stringify(posts));
            localStorage.setItem('oscarUsers', JSON.stringify(Array.from(users)));
            
            // Clear inputs
            document.getElementById('userName').value = '';
            document.getElementById('userMessage').value = '';
            document.getElementById('userHashtags').value = '';
            
            renderFeed();
            updateStats();
        }
        
        // Render feed
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const postTime = new Date(post.timestamp);
                const timeStr = formatTime(postTime);
                
                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <div class="post-header">
                        <span class="post-author">@${post.author}</span>
                        <span class="post-time">${timeStr}</span>
                    </div>
                    ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    <div class="post-text">${escapeHtml(post.message)}</div>
                    ${post.hashtags ? `<div class="post-hashtags">${post.hashtags}</div>` : ''}
                `;
                container.appendChild(postEl);
            });
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="post" style="text-align: center; color: #999;">No posts yet. Be the first to share! 🐱</div>';
            }
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        // Update stats
        function updateStats() {
            document.getElementById('totalPosts').textContent = posts.length;
            document.getElementById('totalUsers').textContent = users.size;
        }
        
        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            generateQR();
            renderFeed();
            updateStats();
        });
        
        // Add default initial posts for today
        window.addEventListener('load', () => {
            if (posts.length === 0) {
                const defaultPosts = [
                    {
                        id: Date.now() + 1,
                        author: 'Oscar Scout #1',
                        message: 'Just spotted Oscar lounging in the garden this morning! He seemed pretty comfortable and relaxed. 😺',
                        hashtags: '#oscarsighting #mysterycatlife #gardenchill',
                        timestamp: new Date(Date.now() - 3600000),
                        image: null
                    },
                    {
                        id: Date.now() + 2,
                        author: 'Oscar Scout #2',
                        message: 'Oscar visited around midday! He spent hours on the porch. Super friendly, came right up to me. Wonder if he lives nearby?',
                        hashtags: '#theadventuresofosc #friendlycat #mysterysolved',
                        timestamp: new Date(Date.now() - 7200000),
                        image: null
                    },
                    {
                        id: Date.now() + 3,
                        author: 'Your Host',
                        message: 'Welcome to The Adventures of Oscar! We don\'t know who this cool cat belongs to, but he visits every day. This is our community feed to track his adventures! 🐱 Share your Oscar sightings!',
                        hashtags: '#welcometooscar #dailyvisitor #communityproject',
                        timestamp: new Date(Date.now() - 10800000),
                        image: null
                    }
                ];
                
                posts = defaultPosts;
                users = new Set(['Oscar Scout #1', 'Oscar Scout #2', 'Your Host']);
                
                localStorage.setItem('oscarPosts', JSON.stringify(posts));
                localStorage.setItem('oscarUsers', JSON.stringify(Array.from(users)));
                
                renderFeed();
                updateStats();
            }
        });
    </script>
</body>
</html>
