<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Adventures of Oscar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;
  --white:#fafafa;
  --gray-100:#f4f4f4;
  --gray-200:#e8e8e8;
  --gray-400:#a0a0a0;
  --gray-600:#6b6b6b;
  --border:1px solid #e8e8e8;
  --radius:12px;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--black);min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:100;background:rgba(250,250,250,0.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:8px}
.header-cat{font-size:20px;line-height:1}
.header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-sub{font-size:11px;font-weight:300;color:var(--gray-400);margin-top:1px;font-style:italic}
.header-info{display:flex;flex-direction:column;justify-content:center}
.qr-btn{background:var(--black);color:var(--white);border:none;border-radius:6px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.5px;transition:opacity .15s}
.qr-btn:hover{opacity:.8}

main{max-width:600px;margin:0 auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px}

.compose{background:var(--white);border:var(--border);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.compose-top{display:flex;align-items:flex-start;gap:10px}
.avatar-badge{width:36px;height:36px;min-width:36px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:var(--border)}
.compose textarea{flex:1;border:none;outline:none;resize:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--black);background:transparent;line-height:1.5;min-height:70px;max-height:180px;overflow-y:auto}
.compose textarea::placeholder{color:var(--gray-400)}

.img-preview{position:relative;margin-top:10px;border-radius:8px;overflow:hidden;border:var(--border);background:var(--gray-100)}
.img-preview img{width:100%;max-height:260px;object-fit:cover;display:block}
.remove-media{position:absolute;top:7px;right:7px;background:rgba(10,10,10,.72);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.remove-media:hover{opacity:.8}

.video-input-bar{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 10px;background:var(--gray-100);border-radius:8px;border:var(--border);animation:slideIn .2s ease}
.video-url-input{flex:1;border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:var(--black)}
.video-url-input::placeholder{color:var(--gray-400)}
.video-url-btn{background:var(--black);color:var(--white);border:none;border-radius:5px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.video-url-btn:hover{opacity:.8}
.video-url-cancel{background:none;border:none;color:var(--gray-400);font-size:18px;cursor:pointer;padding:0 3px;line-height:1;transition:color .1s}
.video-url-cancel:hover{color:var(--black)}

.video-compose-preview{position:relative;margin-top:8px;border-radius:8px;overflow:hidden;border:var(--border);background:#000;cursor:pointer}
.video-compose-preview img{width:100%;max-height:200px;object-fit:cover;display:block;opacity:.85}
.video-compose-preview .play-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,10,.75);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none}
.video-compose-preview .vid-label{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.6));font-size:11px;color:#fff;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.remove-video{position:absolute;top:7px;right:7px;background:rgba(10,10,10,.72);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.remove-video:hover{opacity:.8}

.ai-bar{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:var(--gray-100);border-radius:8px;border:var(--border)}
.ai-enhance-btn{background:var(--black);color:var(--white);border:none;border-radius:6px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.ai-enhance-btn:hover{opacity:.8}
.ai-thinking{font-size:11px;color:var(--gray-400);font-style:italic;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

.compose-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:var(--border)}
.tool-btns{display:flex;gap:4px}
.tool-btn{background:none;border:var(--border);border-radius:6px;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.tool-btn:hover{background:var(--gray-100)}
.tool-btn.active{background:var(--black);border-color:var(--black)}
.char-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);margin-right:8px}
.post-btn{background:var(--black);color:var(--white);border:none;border-radius:6px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.post-btn:hover{opacity:.8}
.post-btn:disabled{opacity:.4;cursor:not-allowed}

.feed{display:flex;flex-direction:column;gap:12px}
.post-card{background:var(--white);border:var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.post-avatar{width:34px;height:34px;min-width:34px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:var(--border)}
.post-meta{display:flex;flex-direction:column;gap:1px}
.post-name{font-size:13px;font-weight:500}
.post-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400)}
.post-body{padding:0 14px;font-size:14px;font-weight:300;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.post-media-img{width:100%;display:block;margin-top:10px;max-height:380px;object-fit:cover;background:var(--gray-100)}

.post-video-thumb{display:block;position:relative;margin-top:10px;cursor:pointer;background:#000;text-decoration:none}
.post-video-thumb img{width:100%;max-height:320px;object-fit:cover;display:block;opacity:.9;transition:opacity .15s}
.post-video-thumb:hover img{opacity:1}
.post-video-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;background:rgba(10,10,10,.75);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;pointer-events:none;transition:background .15s}
.post-video-thumb:hover .post-video-play{background:rgba(10,10,10,.92)}
.post-video-footer{display:flex;align-items:center;gap:8px;padding:7px 12px 8px;background:var(--gray-100);border-top:var(--border)}
.post-video-source{font-family:'DM Mono',monospace;font-size:9px;background:var(--gray-200);padding:2px 7px;border-radius:4px;color:var(--gray-600);white-space:nowrap}
.post-video-link{font-size:11px;color:var(--black);font-weight:400;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.post-video-link:hover{text-decoration:underline}

.post-stats{display:flex;align-items:center;padding:6px 10px;border-top:var(--border);margin-top:10px}
.stat-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--gray-600);transition:background .1s,color .1s;-webkit-tap-highlight-color:transparent}
.stat-btn:hover{background:var(--gray-100);color:var(--black)}
.stat-btn.active-comment{color:var(--black)}
.stat-btn.bumped{animation:bump .2s ease}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.stat-icon{font-size:14px}
.stat-val{font-family:'DM Mono',monospace;font-size:11px}

.comments-section{border-top:var(--border);background:var(--gray-100)}
.comments-section.hidden{display:none}
.comment-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.comment-item{display:flex;gap:8px;align-items:flex-start;animation:slideIn .18s ease}
.comment-avatar{width:26px;height:26px;min-width:26px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:var(--border)}
.comment-bubble{background:var(--white);border:var(--border);border-radius:10px;padding:7px 10px;flex:1;min-width:0}
.comment-name{font-size:11px;font-weight:500;margin-bottom:2px}
.comment-text{font-size:13px;font-weight:300;line-height:1.45;word-break:break-word}
.comment-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray-400);margin-top:3px}
.comment-compose{display:flex;align-items:center;gap:8px;padding:8px 12px 10px;border-top:var(--border)}
.comment-compose-avatar{width:26px;height:26px;min-width:26px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:var(--border)}
.comment-input{flex:1;border:var(--border);outline:none;border-radius:20px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;background:var(--white);color:var(--black)}
.comment-input::placeholder{color:var(--gray-400)}
.comment-send{background:var(--black);color:var(--white);border:none;border-radius:50%;width:30px;height:30px;min-width:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.comment-send:hover{opacity:.8}
.no-comments{font-size:12px;color:var(--gray-400);font-weight:300;text-align:center;padding:8px 0 2px;font-style:italic}

.modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,.6);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--white);border:var(--border);border-radius:16px;padding:28px 24px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(8px);transition:transform .2s}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--gray-400);font-weight:300;margin-bottom:20px}
#qr-canvas{display:inline-block;border:var(--border);border-radius:8px;padding:12px;background:white}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-btn{flex:1;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.modal-btn:hover{opacity:.8}
.modal-btn.primary{background:var(--black);color:var(--white);border:none}
.modal-btn.secondary{background:none;color:var(--black);border:var(--border)}

input[type=file]{display:none}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;font-weight:300}
@media(min-width:640px){main{padding:20px}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-cat">🐱</span>
    <div class="header-info">
      <div class="header-title">Oscar</div>
      <div class="header-sub">Share sightings of your favorite visitor.</div>
    </div>
  </div>
  <button class="qr-btn" onclick="openQR()">QR</button>
</header>

<main>
  <div class="compose">
    <div class="compose-top">
      <div class="avatar-badge" id="myAvatar"></div>
      <textarea id="postText" placeholder="What's Oscar up to?" maxlength="500" oninput="updateChar()"></textarea>
    </div>

    <div id="imgPreview" class="img-preview" style="display:none">
      <img id="imgPreviewEl" src="" alt="">
      <button class="remove-media" onclick="removeImage()">✕</button>
    </div>

    <div id="aiBar" style="display:none;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:var(--gray-100);border-radius:8px;border:var(--border)">
      <span style="font-size:11px;color:var(--gray-600);font-weight:400;flex:1">✨ Let AI write a caption from your photo</span>
      <button class="ai-enhance-btn" id="aiBtn" onclick="aiCaption()">Generate caption</button>
      <span class="ai-thinking" id="aiThinking" style="display:none">thinking…</span>
    </div>

    <div id="videoBar" class="video-input-bar" style="display:none">
      <span style="font-size:15px;line-height:1">🎥</span>
      <input class="video-url-input" id="videoUrlInput" type="url"
        placeholder="Paste YouTube, TikTok, Vimeo or Instagram link…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();attachVideo()}">
      <button class="video-url-btn" onclick="attachVideo()">Attach</button>
      <button class="video-url-cancel" onclick="closeVideoBar()">×</button>
    </div>

    <div id="videoPreview" class="video-compose-preview" style="display:none" onclick="openVideoLink()">
      <img id="videoThumbEl" src="" alt="Video thumbnail">
      <div class="play-badge">▶</div>
      <div class="vid-label" id="videoLabelEl"></div>
      <button class="remove-video" onclick="event.stopPropagation();removeVideo()">✕</button>
    </div>

    <div class="compose-bar">
      <div class="tool-btns">
        <button class="tool-btn" onclick="insertEmoji()" title="Emoji">😊</button>
        <button class="tool-btn" id="imgToolBtn" onclick="triggerImageUpload()" title="Upload photo">📷</button>
        <button class="tool-btn" id="vidToolBtn" onclick="toggleVideoBar()" title="Add video link">🎥</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="char-count" id="charCount">500</span>
        <button class="post-btn" id="postBtn" onclick="submitPost()" disabled>Post</button>
      </div>
    </div>
  </div>

  <div class="feed" id="feed"></div>
</main>

<input type="file" id="imgInput" accept="image/*" onchange="handleImageUpload(event)">

<div class="modal-overlay" id="qrModal" onclick="closeQROutside(event)">
  <div class="modal">
    <div class="modal-title">Share Oscar</div>
    <div class="modal-sub">Scan to open on any device</div>
    <div id="qr-canvas"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeQR()">Close</button>
      <button class="modal-btn primary" onclick="downloadQR()">Download PNG</button>
    </div>
  </div>
</div>

<script>
const AVATARS=['🦁','🐯','🐆','🐱','🐅','🦦','🦊'];
const EMOJIS=['😺','🐾','😻','🌿','🐟','☀️','🎀','🌸','😸','🐦','🍃','✨','🧶','🛋️','😹','🌙','🌾','💤','🎣','🐈'];

const LS_POSTS='oscar_posts_v2';
const LS_STATS='oscar_stats_v2';
const LS_CMTS='oscar_comments_v2';
const LS_AVA='oscar_avatar_v1';

let pendingImage=null;
let pendingVideo=null;

function getMyAvatar(){
  let a=localStorage.getItem(LS_AVA);
  if(!a){a=AVATARS[Math.floor(Math.random()*AVATARS.length)];localStorage.setItem(LS_AVA,a)}
  return a;
}
function loadPosts(){try{return JSON.parse(localStorage.getItem(LS_POSTS))||[]}catch{return[]}}
function savePosts(p){try{localStorage.setItem(LS_POSTS,JSON.stringify(p))}catch(e){console.warn('Storage full',e)}}
function loadStats(){try{return JSON.parse(localStorage.getItem(LS_STATS))||{}}catch{return{}}}
function saveStats(s){try{localStorage.setItem(LS_STATS,JSON.stringify(s))}catch(e){}}
function loadComments(){try{return JSON.parse(localStorage.getItem(LS_CMTS))||{}}catch{return{}}}
function saveComments(c){try{localStorage.setItem(LS_CMTS,JSON.stringify(c))}catch(e){}}

function getStats(id,def){
  const all=loadStats();
  if(!all[id]){all[id]={views:def.views||0,likes:def.likes||0};saveStats(all)}
  return all[id];
}
function incStat(id,key,def){
  const all=loadStats();
  if(!all[id])all[id]={views:def.views||0,likes:def.likes||0};
  all[id][key]=(all[id][key]||0)+1;
  saveStats(all);
  return all[id][key];
}
function getComments(id){const all=loadComments();return all[id]||[]}
function addComment(postId,comment){
  const all=loadComments();
  if(!all[postId])all[postId]=[];
  all[postId].push(comment);
  saveComments(all);
}

const myAvatar=getMyAvatar();
document.getElementById('myAvatar').textContent=myAvatar;
let posts=loadPosts();

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(iso){
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/1000);
  if(diff<60)return'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function fmtNum(n){if(n>=1000)return(n/1000).toFixed(1).replace(/\.0$/,'')+'k';return n}

function parseVideoUrl(raw){
  const url=raw.trim();
  let id,thumb,source,label,link=url;

  let m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
  if(m){
    id=m[1];
    thumb=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    source='YouTube';
    label=url;
    return{url:link,thumb,source,label};
  }

  m=url.match(/vimeo\.com\/(\d+)/);
  if(m){
    id=m[1];
    thumb=`https://vumbnail.com/${id}.jpg`;
    source='Vimeo';
    label=url;
    return{url:link,thumb,source,label};
  }

  if(url.includes('tiktok.com')){
    thumb='';
    source='TikTok';
    label=url;
    return{url:link,thumb,source,label};
  }

  if(url.includes('instagram.com')){
    thumb='';
    source='Instagram';
    label=url;
    return{url:link,thumb,source,label};
  }

  return{url:link,thumb:'',source:'Video',label:url};
}

function toggleVideoBar(){
  const bar=document.getElementById('videoBar');
  const btn=document.getElementById('vidToolBtn');
  const showing=bar.style.display!=='none';
  if(showing){closeVideoBar();return;}
  bar.style.display='flex';
  btn.classList.add('active');
  setTimeout(()=>document.getElementById('videoUrlInput').focus(),50);
}
function closeVideoBar(){
  document.getElementById('videoBar').style.display='none';
  document.getElementById('videoUrlInput').value='';
  document.getElementById('vidToolBtn').classList.remove('active');
}

function attachVideo(){
  const raw=document.getElementById('videoUrlInput').value;
  if(!raw.trim())return;
  const parsed=parseVideoUrl(raw);
  pendingVideo=parsed;
  closeVideoBar();

  const preview=document.getElementById('videoPreview');
  const thumbEl=document.getElementById('videoThumbEl');
  const labelEl=document.getElementById('videoLabelEl');

  if(parsed.thumb){
    thumbEl.src=parsed.thumb;
    thumbEl.style.display='block';
  }else{
    thumbEl.style.display='none';
    preview.style.background='#111';
  }
  labelEl.textContent=`${parsed.source} · ${parsed.url}`;
  preview.style.display='block';
  checkPostable();
}

function removeVideo(){
  pendingVideo=null;
  document.getElementById('videoPreview').style.display='none';
  document.getElementById('videoThumbEl').src='';
  checkPostable();
}

function openVideoLink(){
  if(pendingVideo)window.open(pendingVideo.url,'_blank','noopener');
}

function triggerImageUpload(){document.getElementById('imgInput').click()}

function handleImageUpload(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingImage=ev.target.result;
    document.getElementById('imgPreviewEl').src=pendingImage;
    document.getElementById('imgPreview').style.display='block';
    document.getElementById('aiBar').style.display='flex';
    checkPostable();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function removeImage(){
  pendingImage=null;
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgPreviewEl').src='';
  document.getElementById('aiBar').style.display='none';
  checkPostable();
}

async function aiCaption(){
  if(!pendingImage)return;
  const btn=document.getElementById('aiBtn');
  const thinking=document.getElementById('aiThinking');
  btn.style.display='none';
  thinking.style.display='inline';
  const base64=pendingImage.split(',')[1];
  const mediaType=pendingImage.split(';')[0].split(':')[1];
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:150,
        system:`You write short, warm, witty captions for "The Adventures of Oscar" — a community feed about Oscar, a charming neighbourhood cat everyone loves. Write ONE caption: 1–2 sentences, max 120 characters, playful and specific to what you see. No hashtags, no quotes. Just the caption text.`,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Write a caption for this Oscar sighting.'}
          ]
        }]
      })
    });
    const data=await resp.json();
    const caption=data.content&&data.content[0]&&data.content[0].text;
    if(caption){
      const ta=document.getElementById('postText');
      ta.value=caption.trim().slice(0,500);
      updateChar();
    }
  }catch(err){console.error('AI error:',err)}
  finally{btn.style.display='inline';thinking.style.display='none'}
}

function buildVideoHtml(post){
  if(!post.videoUrl)return'';
  const thumb=post.videoThumb
    ?`<img src="${escHtml(post.videoThumb)}" alt="Video thumbnail" loading="lazy" onerror="this.style.display='none'">`
    :`<div style="height:80px;background:#111;display:flex;align-items:center;justify-content:center;font-size:28px">🎥</div>`;
  const shortUrl=post.videoUrl.replace(/^https?:\/\/(www\.)?/,'').slice(0,55)+(post.videoUrl.length>58?'…':'');
  return`
    <a class="post-video-thumb" href="${escHtml(post.videoUrl)}" target="_blank" rel="noopener">
      ${thumb}
      <div class="post-video-play">▶</div>
    </a>
    <div class="post-video-footer">
      <span class="post-video-source">${escHtml(post.videoSource||'Video')}</span>
      <a class="post-video-link" href="${escHtml(post.videoUrl)}" target="_blank" rel="noopener">${escHtml(shortUrl)}</a>
    </div>`;
}

function createPostEl(post){
  const def={views:post.views||0,likes:post.likes||0};
  const stats=getStats(post.id,def);
  const comments=getComments(post.id);
  const pid=escHtml(post.id);

  const el=document.createElement('div');
  el.className='post-card';
  el.dataset.id=post.id;

  const imgHtml=post.media
    ?`<img class="post-media-img" src="${escHtml(post.media)}" alt="Oscar sighting" loading="lazy">`:'';
  const vidHtml=post.videoUrl?buildVideoHtml(post):'';

  el.innerHTML=`
    <div class="post-header">
      <div class="post-avatar">${escHtml(post.avatar)}</div>
      <div class="post-meta">
        <div class="post-name">${escHtml(post.name)}</div>
        <div class="post-time">${formatTime(post.time)}</div>
      </div>
    </div>
    ${post.text?`<div class="post-body">${escHtml(post.text)}</div>`:''}
    ${imgHtml}
    ${vidHtml}
    <div class="post-stats">
      <button class="stat-btn" onclick="bumpStat(this,'${pid}','views',${JSON.stringify(def)})">
        <span class="stat-icon">👁️</span>
        <span class="stat-val">${fmtNum(stats.views)}</span>
      </button>
      <button class="stat-btn" id="cmt-btn-${pid}" onclick="toggleComments('${pid}',this)">
        <span class="stat-icon">💬</span>
        <span class="stat-val" id="cmt-count-${pid}">${comments.length}</span>
      </button>
      <button class="stat-btn" onclick="bumpStat(this,'${pid}','likes',${JSON.stringify(def)})">
        <span class="stat-icon">❤️</span>
        <span class="stat-val">${fmtNum(stats.likes)}</span>
      </button>
    </div>
    <div class="comments-section hidden" id="cs-${pid}">
      <div class="comment-list" id="cl-${pid}"></div>
      <div class="comment-compose">
        <div class="comment-compose-avatar">${escHtml(myAvatar)}</div>
        <input class="comment-input" type="text" placeholder="Add a comment…" maxlength="300"
          onkeydown="if(event.key==='Enter'){event.preventDefault();sendComment('${pid}',this)}">
        <button class="comment-send" onclick="sendComment('${pid}',this.previousElementSibling)">↑</button>
      </div>
    </div>`;

  return el;
}

function renderCommentList(postId){
  const list=document.getElementById('cl-'+postId);
  if(!list)return;
  const comments=getComments(postId);
  if(comments.length===0){
    list.innerHTML='<div class="no-comments">No comments yet — say something nice 🐾</div>';
    return;
  }
  list.innerHTML='';
  comments.forEach(c=>{
    const item=document.createElement('div');
    item.className='comment-item';
    item.innerHTML=`
      <div class="comment-avatar">${escHtml(c.avatar)}</div>
      <div class="comment-bubble">
        <div class="comment-name">${escHtml(c.name)}</div>
        <div class="comment-text">${escHtml(c.text)}</div>
        <div class="comment-time">${formatTime(c.time)}</div>
      </div>`;
    list.appendChild(item);
  });
  list.scrollTop=list.scrollHeight;
}

function toggleComments(postId,btn){
  const section=document.getElementById('cs-'+postId);
  if(!section)return;
  const wasHidden=section.classList.contains('hidden');
  section.classList.toggle('hidden',!wasHidden);
  btn.classList.toggle('active-comment',wasHidden);
  if(wasHidden)renderCommentList(postId);
}

function sendComment(postId,input){
  const text=input.value.trim();
  if(!text)return;
  const c={avatar:myAvatar,name:'You',text,time:new Date().toISOString()};
  addComment(postId,c);
  input.value='';
  renderCommentList(postId);
  const countEl=document.getElementById('cmt-count-'+postId);
  if(countEl)countEl.textContent=getComments(postId).length;
}

function bumpStat(btn,id,key,def){
  const newVal=incStat(id,key,def);
  btn.querySelector('.stat-val').textContent=fmtNum(newVal);
  btn.classList.remove('bumped');void btn.offsetWidth;btn.classList.add('bumped');
}

function renderFeed(){
  const feed=document.getElementById('feed');
  feed.innerHTML='';
  if(posts.length===0){
    feed.innerHTML='<div class="empty-state">No sightings yet — be the first to spot Oscar 🐾</div>';
    return;
  }
  posts.forEach(p=>feed.appendChild(createPostEl(p)));
}

function updateChar(){
  const ta=document.getElementById('postText');
  document.getElementById('charCount').textContent=500-ta.value.length;
  checkPostable();
}

function checkPostable(){
  const ta=document.getElementById('postText');
  document.getElementById('postBtn').disabled=!ta.value.trim()&&!pendingImage&&!pendingVideo;
}

function insertEmoji(){
  const ta=document.getElementById('postText');
  const em=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  const s=ta.selectionStart,en=ta.selectionEnd;
  const nv=ta.value.slice(0,s)+em+ta.value.slice(en);
  if(nv.length<=500){ta.value=nv;ta.selectionStart=ta.selectionEnd=s+em.length}
  ta.focus();updateChar();
}

function submitPost(){
  const ta=document.getElementById('postText');
  const text=ta.value.trim();
  if(!text&&!pendingImage&&!pendingVideo)return;
  const id='u'+Date.now();
  const newPost={
    id,avatar:myAvatar,name:'You',
    time:new Date().toISOString(),
    text:text||'',
    media:pendingImage||'',
    videoUrl:pendingVideo?pendingVideo.url:'',
    videoThumb:pendingVideo?pendingVideo.thumb:'',
    videoSource:pendingVideo?pendingVideo.source:'',
    views:0,likes:0
  };
  posts.unshift(newPost);
  savePosts(posts);
  ta.value='';
  removeImage();
  removeVideo();
  updateChar();
  const feed=document.getElementById('feed');
  if(feed.querySelector('.empty-state'))feed.innerHTML='';
  feed.prepend(createPostEl(newPost));
}

let qrGenerated=false;
function openQR(){
  document.getElementById('qrModal').classList.add('active');
  if(!qrGenerated){
    new QRCode(document.getElementById('qr-canvas'),{
      text:window.location.href,width:200,height:200,
      colorDark:'#0a0a0a',colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M
    });
    qrGenerated=true;
  }
}
function closeQR(){document.getElementById('qrModal').classList.remove('active')}
function closeQROutside(e){if(e.target===e.currentTarget)closeQR()}
function downloadQR(){
  const canvas=document.querySelector('#qr-canvas canvas');
  if(!canvas)return;
  const a=document.createElement('a');
  a.download='oscar-qr.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}
