<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar - Post & Discover</title>
    <!-- [CSS OMITTED FOR BREVITY, see previous workbench output] -->
</head>
<body>
    <div class="container">
        <!-- COLLECTION SIDEBAR -->
        <div class="collection-sidebar" id="collectionSidebar">
            <button class="add-qr-btn" onclick="scanQR()" title="Scan QR Code">
                +
            </button>
        </div>
        <!-- MAIN FEED -->
        <div class="main-feed">
            <div class="feed-header">
                <h1>Oscar</h1>
                <p id="collectionName">Scan a QR code to start</p>
            </div>
            <div class="feed-container">
                <div class="posts-wrapper">
                    <!-- COMPOSE AREA -->
                    <div class="compose-area">
                        <div class="compose-box">
                            <div class="compose-avatar" id="composeAvatar">🦁</div>
                            <div class="compose-input-wrapper">
                                <textarea class="compose-input" id="postInput" placeholder="What's on your mind?" maxlength="500"></textarea>
                                <div class="compose-footer">
                                    <button class="compose-btn" onclick="postMessage()" id="postBtn">Post</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- POSTS FEED -->
                    <div id="feedContent"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
// [JS OMITTED FOR BREVITY, see previous workbench output]
    </script>
</body>
</html>
